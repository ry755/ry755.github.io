on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout site
        uses: actions/checkout@v5
        with:
          path: site

      - name: Checkout fox32
        uses: actions/checkout@v5
        with:
          repository: 'fox32-arch/fox32'
          path: fox32_src

      - name: Checkout ryfs
        uses: actions/checkout@v5
        with:
          repository: 'ry755/ryfs'
          path: ryfs

      - name: Build site
        run: |
          cd site
          make

      - name: Download latest fox32rom artifact
        uses: dawidd6/action-download-artifact@v2
        with:
          repo: fox32-arch/fox32rom
          workflow: fox32rom-unstable.yml
          workflow_conclusion: success

      - name: Download latest fox32os artifact
        uses: dawidd6/action-download-artifact@v2
        with:
          repo: fox32-arch/fox32os
          workflow: fox32os-unstable.yml
          workflow_conclusion: success

      - name: Move fox32.rom into the root folder
        run: |
          cp fox32.rom/fox32.rom fox32_src/fox32.rom

      - name: Move fox32os.img into the root folder
        run: |
          cp fox32os.img/fox32os.img fox32_src/fox32os.img

      - name: Install vim (for xxd) and python3 (for ryfs)
        run: |
          sudo apt update
          sudo apt install -y vim python3

      - name: Checkout Emscripten SDK
        uses: actions/checkout@v5
        with:
          repository: 'emscripten-core/emsdk'
          path: emsdk

      - name: Install Emscripten SDK
        run: |
          emsdk/emsdk install latest
          emsdk/emsdk activate latest

      - name: Add readme.txt to fox32os.img and add to startup.bat
        run: |
          cd fox32_src
          python3 ../ryfs/ryfs.py -d user/desktop add fox32os.img ../site/fox32/additional_files/readme.txt
          python3 ../ryfs/ryfs.py -d system export fox32os.img startup.bat
          sed -i '/exit;/i \
          */apps/hjkl /user/desktop/readme.txt;' startup.bat
          python3 ../ryfs/ryfs.py -d system add fox32os.img startup.bat

      - name: Build fox32
        run: |
          source emsdk/emsdk_env.sh
          cd fox32_src
          make TARGET=wasm
          cp fox32.wasm fox32.js fox32.data ../site/fox32/

      - name: Upload static files as artifact
        id: deployment
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
